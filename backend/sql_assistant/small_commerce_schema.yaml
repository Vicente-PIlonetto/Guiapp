# Catalogo controlado do Small Commerce para o Assistente SQL.
#
# Substitua e expanda este arquivo com as tabelas, colunas, relacionamentos
# e regras reais do Small Commerce. O assistente deve usar somente o que
# estiver descrito aqui.

database:
  engine: Firebird
  product: Small Commerce

rules:
  - Gere SQL apenas para o banco Firebird do Small Commerce.
  - Use somente tabelas e colunas presentes neste catalogo.
  - Quando faltar informacao, explique a premissa ou peca mais contexto.
  - Nao gere comandos DROP, ALTER, CREATE DATABASE, EXECUTE BLOCK, GRANT ou REVOKE.
  - UPDATE, INSERT e DELETE sao permitidos somente como scripts para revisao humana.
  - Nao use WHERE 1=0 como protecao; isso invalida scripts que devem aplicar alteracao em massa.
  - Nao use WHERE 1=1 para alteracao em massa; gere UPDATE sem WHERE quando todos os registros devem ser alterados.
  - Gere comandos SQL em linha unica para uso direto no Small Commerce.
  - UPDATE sem WHERE e valido quando a solicitacao pedir todos os registros, mas deve trazer aviso de risco.
  - Para generators, use SET GENERATOR em linha unica e coloque o numero anterior ao documento que deve iniciar.

generators:
  OS: G_NUMEROOS
  NF_SERIE_1: G_SERIE1
  NF_SERIE_2: G_SERIE2
  ORCAMENTO: G_ORCAMENTO
  NFCE: G_NUMERONFCE
  CFE_SAT: G_NUMEROCFESAT_XXX
  MDFE: G_MDFENUMERO

tables:
  ESTOQUE:
    description: Cadastro/estoque de produtos do Small Commerce.
    columns:
      CST_ICMS: Codigo CST ICMS usado nos itens/produtos.
      CST_NFCE: Codigo CST usado para NFC-e nos itens/produtos.
      CSOSN: Codigo CSOSN usado para itens/produtos no regime Simples Nacional.
      CSOSN_NFCE: Codigo CSOSN usado para NFC-e nos itens/produtos.
    examples:
      - request: Definir CST_NFCE como 00 para todos os itens do estoque.
        sql: UPDATE ESTOQUE SET CST_NFCE = '00';
